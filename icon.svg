<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#ffffff"/>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c63ff"/>
      <stop offset="100%" stop-color="#3ecfcf"/>
    </linearGradient>
  </defs>
  <!-- Music note -->
  <g fill="white">
    <!-- Note head 1 -->
    <ellipse cx="185" cy="340" rx="42" ry="30" transform="rotate(-20 185 340)"/>
    <!-- Note head 2 -->
    <ellipse cx="335" cy="295" rx="42" ry="30" transform="rotate(-20 335 295)"/>
    <!-- Stem 1 -->
    <rect x="220" y="172" width="14" height="168" rx="7"/>
    <!-- Stem 2 -->
    <rect x="370" y="127" width="14" height="168" rx="7"/>
    <!-- Beam -->
    <polygon points="220,172 384,127 384,152 220,197"/>
  </g>
</svg>
